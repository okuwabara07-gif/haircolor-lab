name: AdSense Deploy All Sites
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "yes と入力して実行"
        required: true
        default: "no"
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy AdSense
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/adsense_deploy.py
      - name: Notify
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AOKAE AdSense全サイト展開完了"
          to: o.kuwabara07@gmail.com
          from: AOKAE Bot
          body: "AdSenseコードを全サイトに展開しました。"
