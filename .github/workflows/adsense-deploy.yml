name: AdSense Deploy All Sites
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "yes と入力して実行"
        required: true
        default: "no"
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy AdSense
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/adsense_deploy.py
      - name: Send notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_SUBJECT: "AOKAE AdSense全サイト展開完了"
          NOTIFY_BODY: "AdSenseコードを全サイトに展開しました。"
        run: python3 scripts/notify.py
