name: AdSense Deploy All Sites
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "yes と入力して実行"
        required: true
        default: "no"
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy AdSense
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/adsense_deploy.py
      - name: Notify via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 << 'EOF'
import urllib.request, json, os
key = os.environ["RESEND_API_KEY"]
data = json.dumps({
    "from": "AOKAE Bot <onboarding@resend.dev>",
    "to": ["o.kuwabara07@gmail.com"],
    "subject": "AOKAE AdSense全サイト展開完了",
    "text": "AdSenseコードを全サイトに展開しました。"
}).encode()
req = urllib.request.Request(
    "https://api.resend.com/emails",
    data=data,
    headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
    method="POST"
)
urllib.request.urlopen(req)
print("通知送信完了")
EOF
