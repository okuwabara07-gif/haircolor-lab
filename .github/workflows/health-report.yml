name: Health Check and Morning Report
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and report
        id: rep
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: python3 scripts/health_check.py
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AOKAE朝レポ 正常${{ steps.rep.outputs.ok }}件 異常${{ steps.rep.outputs.ng }}件 記事${{ steps.rep.outputs.articles }}件 AdSense可能${{ steps.rep.outputs.ready }}件"
          to: o.kuwabara07@gmail.com
          from: AOKAE Bot
          body: file://report.txt
