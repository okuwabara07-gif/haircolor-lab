name: Health Check and Morning Report
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and report
        id: rep
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: python3 scripts/health_check.py
      - name: Send notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_SUBJECT: "AOKAE朝レポ 正常${{ steps.rep.outputs.ok }}件 異常${{ steps.rep.outputs.ng }}件 記事${{ steps.rep.outputs.articles }}件 AdSense可能${{ steps.rep.outputs.ready }}件"
          NOTIFY_BODY_FILE: report.txt
        run: python3 scripts/notify.py
