name: Health Check and Morning Report
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and report
        id: rep
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: python3 scripts/health_check.py
      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OK_COUNT: ${{ steps.rep.outputs.ok }}
          NG_COUNT: ${{ steps.rep.outputs.ng }}
          ARTICLES: ${{ steps.rep.outputs.articles }}
          READY: ${{ steps.rep.outputs.ready }}
        run: |
          BODY=$(cat report.txt)
          python3 << 'EOF'
import urllib.request, json, os
key = os.environ["RESEND_API_KEY"]
ok = os.environ.get("OK_COUNT","?")
ng = os.environ.get("NG_COUNT","?")
articles = os.environ.get("ARTICLES","?")
ready = os.environ.get("READY","?")
with open("report.txt") as f:
    body = f.read()
data = json.dumps({
    "from": "AOKAE Bot <onboarding@resend.dev>",
    "to": ["o.kuwabara07@gmail.com"],
    "subject": f"AOKAE朝レポ 正常{ok}件 異常{ng}件 記事{articles}件 AdSense可能{ready}件",
    "text": body
}).encode()
req = urllib.request.Request(
    "https://api.resend.com/emails",
    data=data,
    headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
    method="POST"
)
res = urllib.request.urlopen(req).read()
print("送信完了:", res.decode())
EOF
