name: Weekly AdSense Check
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check readiness
        id: chk
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: python3 scripts/adsense_check.py
      - name: Send notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_SUBJECT: "AOKAE週次 AdSense申請可能${{ steps.chk.outputs.ready }}件"
          NOTIFY_BODY_FILE: adsense_report.txt
        run: python3 scripts/notify.py
