name: Manual Article Generation
on:
  workflow_dispatch:
    inputs:
      target:
        description: "対象サイト名 (all=全サイト)"
        required: true
        default: "all"
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger generation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
        run: python3 scripts/manual_trigger.py
      - name: Notify
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_SUBJECT: "AOKAE 記事生成トリガー完了: ${{ github.event.inputs.target }}"
          NOTIFY_BODY: "記事生成をトリガーしました。"
        run: python3 scripts/notify.py
