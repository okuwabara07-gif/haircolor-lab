name: Manual Article Generation
on:
  workflow_dispatch:
    inputs:
      target:
        description: "対象サイト名 (all=全サイト)"
        required: true
        default: "all"
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger generation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
        run: python3 scripts/manual_trigger.py
      - name: Notify
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AOKAE 記事生成トリガー完了: ${{ github.event.inputs.target }}"
          to: o.kuwabara07@gmail.com
          from: AOKAE Bot
          body: "記事生成をトリガーしました。対象: ${{ github.event.inputs.target }}"
