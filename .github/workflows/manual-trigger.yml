name: Manual Article Generation
on:
  workflow_dispatch:
    inputs:
      target:
        description: "対象サイト名 (all=全サイト)"
        required: true
        default: "all"
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger generation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
        run: python3 scripts/manual_trigger.py
      - name: Notify via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          python3 << 'EOF'
import urllib.request, json, os
key = os.environ["RESEND_API_KEY"]
target = os.environ.get("TARGET","all")
data = json.dumps({
    "from": "AOKAE Bot <onboarding@resend.dev>",
    "to": ["o.kuwabara07@gmail.com"],
    "subject": f"AOKAE 記事生成トリガー完了: {target}",
    "text": f"記事生成をトリガーしました。対象: {target}"
}).encode()
req = urllib.request.Request(
    "https://api.resend.com/emails",
    data=data,
    headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
    method="POST"
)
urllib.request.urlopen(req)
print("通知送信完了")
EOF
